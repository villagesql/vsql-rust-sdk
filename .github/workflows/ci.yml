name: test
on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  fmt:
    name: Formatting
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Rust
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          components: rustfmt

      - name: Check formatting
        run: cargo fmt --all -- --check

  audit:
    name: Security audit
    runs-on: ubuntu-latest
    permissions:
      contents: read
      checks: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Run audit
        uses: rustsec/audit-check@v2
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

  doc:
    name: Docs
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Rust
        uses: actions-rust-lang/setup-rust-toolchain@v1

      - name: Check docs
        run: cargo doc --no-deps --all-features
        env:
          RUSTDOCFLAGS: -D warnings

  clippy:
    name: Clippy
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Rust
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          components: clippy

      - name: Run Clippy
        run: cargo clippy --all-targets --all-features -- -D warnings -W clippy::pedantic

  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Rust
        uses: actions-rust-lang/setup-rust-toolchain@v1

      - name: Run Rust tests
        run: cargo test

  check-bindings:
    name: Check bindings are up to date
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Environment
        run: sudo apt-get install -y --no-install-recommends libclang-dev

      - name: Set up Rust
        uses: actions-rust-lang/setup-rust-toolchain@v1

      - name: Regenerate bindings
        run: cargo build -p villagesql-sys --features villagesql-sys/regenerate-bindings

      - name: Fail if bindings differ from committed
        run: git diff --exit-code villagesql-sys/src/bindings.rs

      - name: Install cargo-vsql
        run: cargo install --path cargo-vsql

      - name: Cache cargo-vsql binary
        uses: actions/cache/save@v5
        with:
          path: ~/.cargo/bin/cargo-vsql
          key: cargo-vsql-${{ runner.os }}-${{ hashFiles('cargo-vsql/src/**', 'cargo-vsql/Cargo.toml') }}

  package:
    name: Package ${{ matrix.name }}
    runs-on: ubuntu-latest
    needs: [build, check-bindings]
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: vsql_rot13
            dir: examples/vsql_rot13
          - name: vsql_rational
            dir: examples/vsql_rational
          - name: sdk_coverage
            dir: tests/sdk_coverage

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Rust
        uses: actions-rust-lang/setup-rust-toolchain@v1

      - name: Restore cargo-vsql binary
        uses: actions/cache/restore@v5
        with:
          path: ~/.cargo/bin/cargo-vsql
          key: cargo-vsql-${{ runner.os }}-${{ hashFiles('cargo-vsql/src/**', 'cargo-vsql/Cargo.toml') }}

      - name: Download VillageSQL dev server
        uses: dawidd6/action-download-artifact@v21
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          repo: villagesql/villagesql-server
          workflow: extension-compat.yml
          workflow_conclusion: success
          name: devserver-linux-x86_64
          path: ${{ github.workspace }}

      - name: Extract VillageSQL dev server
        run: |
          tar xzf villagesql-dev-server-*.tar.gz
          echo "VillageSQL_BUILD_DIR=$GITHUB_WORKSPACE/$(ls -d villagesql-dev-server-*/)" >> "$GITHUB_ENV"

      - name: Test & Package
        working-directory: ${{ matrix.dir }}
        run: cargo vsql test

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.name }}.veb
          path: dist/${{ matrix.name }}.veb
