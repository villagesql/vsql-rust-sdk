name: test
on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Environment
        run: sudo apt-get install -y --no-install-recommends libclang-dev

      - name: Set up Rust
        uses: actions-rust-lang/setup-rust-toolchain@v1

      - name: Run Rust tests
        run: cargo test

      - name: Install cargo-vsql
        run: cargo install --path cargo-vsql

      - name: Cache cargo-vsql binary
        uses: actions/cache/save@v4
        with:
          path: ~/.cargo/bin/cargo-vsql
          key: cargo-vsql-${{ runner.os }}-${{ hashFiles('cargo-vsql/src/**', 'cargo-vsql/Cargo.toml') }}

  package:
    name: Package ${{ matrix.name }}
    runs-on: ubuntu-latest
    needs: build
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: rot13
            dir: examples/rot13
          - name: rational
            dir: examples/rational
          - name: sdk_coverage
            dir: tests/sdk_coverage

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Environment
        run: sudo apt update && sudo apt install -y libclang-dev

      - name: Set up Rust
        uses: actions-rust-lang/setup-rust-toolchain@v1

      - name: Restore cargo-vsql binary
        uses: actions/cache/restore@v4
        with:
          path: ~/.cargo/bin/cargo-vsql
          key: cargo-vsql-${{ runner.os }}-${{ hashFiles('cargo-vsql/src/**', 'cargo-vsql/Cargo.toml') }}

      - name: Download VillageSQL dev server
        uses: dawidd6/action-download-artifact@v6
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          repo: villagesql/villagesql-server
          workflow: extension-compat.yml
          workflow_conclusion: success
          name: devserver-linux-x86_64
          path: ${{ github.workspace }}

      - name: Extract VillageSQL dev server
        run: |
          tar xzf villagesql-dev-server-*.tar.gz
          echo "VillageSQL_BUILD_DIR=$GITHUB_WORKSPACE/$(ls -d villagesql-dev-server-*/)" >> "$GITHUB_ENV"

      - name: Test & Package
        working-directory: ${{ matrix.dir }}
        run: cargo vsql test

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.name }}.veb
          path: dist/${{ matrix.name }}.veb
